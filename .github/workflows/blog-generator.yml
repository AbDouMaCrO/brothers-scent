name: Generate Blog Articles

on:
  schedule:
    - cron: '0 6,12,18,0 * * *'   # 4x daily: 06:00, 12:00, 18:00, 00:00 UTC
  workflow_dispatch:
    inputs:
      topic_limit:
        description: 'Max articles to generate (default: 2)'
        default: '2'
        required: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        working-directory: scraper
        run: npm ci

      - name: Generate blog articles
        working-directory: scraper
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL:   ${{ secrets.OPENROUTER_MODEL }}
        run: node generate-blog.js

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/ sitemap.xml
          git diff --staged --quiet && echo "No new articles" || git commit -m "feat: ai-generated blog articles [skip ci]"
          git push
