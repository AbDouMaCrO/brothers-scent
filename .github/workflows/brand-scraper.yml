name: Scrape Fragrantica Brands

on:
  schedule:
    - cron: '0 5 * * 1'   # Every Monday 05:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

permissions:
  contents: write           # Needed to commit brands.json back to repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install scraper dependencies
        working-directory: scraper
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        working-directory: scraper
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node brands.js

      - name: Commit updated brands.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper/output/brands.json
          git diff --staged --quiet && echo "No changes" || git commit -m "chore: update fragrantica brand data [skip ci]"
          git push
