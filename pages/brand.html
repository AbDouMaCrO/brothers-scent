<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand — BrotherScents</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        purple: { 400:'#c084fc', 500:'#a855f7', 600:'#9333ea', 700:'#7e22ce', 900:'#3b0764' },
                        indigo: { 950:'#1e1b4b' },
                        gold:   { 400:'#facc15', 500:'#eab308' }
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; min-height: 100vh; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #3b0764; border-radius: 3px; }

        .card-bg {
            background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .gradient-text {
            background: linear-gradient(to right, #e9d5ff, #a855f7, #6366f1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .gradient-text-gold {
            background: linear-gradient(to right, #fde68a, #f59e0b, #d97706);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .fragrance-card:hover { border-color: rgba(168,85,247,0.4); transform: translateY(-2px); }
        .fragrance-card { transition: all 0.2s ease; }

        @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<!-- Nav -->
<nav class="sticky top-0 z-50 px-4 py-4" style="background:rgba(5,5,5,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05)">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
        <a href="/" class="flex items-center gap-2 text-sm text-gray-400 hover:text-white transition-colors">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Back
        </a>
        <a href="/" class="text-sm font-semibold gradient-text">BrotherScents</a>
        <a id="fragrantica-link" href="#" target="_blank" rel="noopener"
           class="text-xs text-purple-400 hover:text-purple-300 transition-colors">
            View on Fragrantica →
        </a>
    </div>
</nav>

<!-- Hero -->
<header class="py-16 px-4 text-center relative overflow-hidden">
    <div class="absolute inset-0 pointer-events-none" style="background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(168,85,247,0.12) 0%,transparent 70%)"></div>
    <div class="max-w-2xl mx-auto relative z-10">
        <p class="text-xs font-semibold uppercase tracking-widest text-purple-400 mb-3">Brand</p>
        <h1 id="brand-name" class="text-4xl md:text-6xl font-semibold tracking-tight gradient-text mb-4">Loading…</h1>
        <p id="brand-meta" class="text-gray-500 text-sm"></p>
    </div>
</header>

<!-- Fragrances grid -->
<main class="max-w-7xl mx-auto px-4 pb-24">
    <div class="mb-8 flex items-center justify-between">
        <h2 class="text-lg font-semibold text-gray-200">Top 10 Fragrances</h2>
        <span id="updated-at" class="text-xs text-gray-600"></span>
    </div>

    <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
        <!-- skeletons while loading -->
        <div class="skeleton aspect-[3/4]"></div>
        <div class="skeleton aspect-[3/4]"></div>
        <div class="skeleton aspect-[3/4]"></div>
        <div class="skeleton aspect-[3/4]"></div>
        <div class="skeleton aspect-[3/4]"></div>
    </div>

    <p id="error-msg" class="hidden text-center text-gray-500 mt-16 text-sm"></p>
</main>

<script>
const params = new URLSearchParams(location.search);
const slug   = params.get('slug');

if (!slug) {
    document.getElementById('brand-name').textContent = 'Brand not found';
} else {
    fetch(`/scraper/output/fragrances/${encodeURIComponent(slug)}.json`)
        .then(r => { if (!r.ok) throw new Error('Not found'); return r.json(); })
        .then(render)
        .catch(() => showError('Brand data not available yet. Check back after the next scrape.'));
}

function render(data) {
    document.title = `${data.brand_name} — BrotherScents`;
    document.getElementById('brand-name').textContent = data.brand_name;
    document.getElementById('fragrantica-link').href  = data.brand_url;
    document.getElementById('brand-meta').textContent = `${data.fragrances.length} fragrances scraped from Fragrantica`;

    const date = new Date(data.scraped_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    document.getElementById('updated-at').textContent = `Updated ${date}`;

    const grid = document.getElementById('grid');

    if (!data.fragrances.length) {
        showError('No fragrances found for this brand yet.');
        return;
    }

    grid.innerHTML = data.fragrances.map((f, i) => `
        <a href="${f.url}" target="_blank" rel="noopener"
           class="fragrance-card card-bg rounded-2xl overflow-hidden group">
            <div class="relative aspect-[3/4] bg-gray-900/50 overflow-hidden">
                ${f.img
                    ? `<img src="${f.img}" alt="${f.name}"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                            onerror="this.style.display='none'">`
                    : '<div class="w-full h-full flex items-center justify-center text-gray-700"><svg width="40" height="40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3v1m0 16v1M4.22 4.22l.71.71m14.14 14.14.71.71M3 12H2m20 0h-1M4.22 19.78l.71-.71M18.36 5.64l.71-.71"/></svg></div>'
                }
                <div class="absolute top-2 left-2 w-6 h-6 rounded-full bg-purple-600/90 flex items-center justify-center text-[10px] font-bold">${i + 1}</div>
                ${f.rating ? `<div class="absolute top-2 right-2 px-2 py-0.5 rounded-full text-[10px] font-semibold gradient-text-gold" style="background:rgba(0,0,0,0.6)">${f.rating.toFixed(2)}</div>` : ''}
            </div>
            <div class="p-3">
                <p class="text-xs font-medium text-gray-200 leading-tight line-clamp-2 group-hover:text-white">${f.name}</p>
                ${f.votes ? `<p class="text-[10px] text-gray-600 mt-1">${f.votes.toLocaleString()} votes</p>` : ''}
            </div>
        </a>
    `).join('');
}

function showError(msg) {
    document.getElementById('grid').innerHTML = '';
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.remove('hidden');
}
</script>

</body>
</html>
